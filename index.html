<!DOCTYPE html>
<html lang="lo">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0c4a6e" />
  <title>WiFi — Kolaogroup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;500;600;700&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --brand-deep: #0c4a6e;
      --brand: #0369a1;
      --brand-light: #0ea5e9;
      --brand-soft: #e0f2fe;
      --white: #ffffff;
      --text: #0f172a;
      --text-muted: #64748b;
      --radius: 1rem;
      --shadow: 0 25px 50px -12px rgba(12, 74, 110, 0.35);
      --transition: 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      min-height: 100dvh;
      font-family: "Noto Sans Lao", "Noto Sans Thai", system-ui, sans-serif;
      color: var(--text);
      background: linear-gradient(145deg, #0c4a6e 0%, #0369a1 45%, #38bdf8 100%);
      overflow-x: hidden;
    }

    .portal {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: max(1rem, env(safe-area-inset-top)) max(1rem, env(safe-area-inset-right))
        max(1rem, env(safe-area-inset-bottom)) max(1rem, env(safe-area-inset-left));
    }

    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: inherit;
      opacity: 0;
      visibility: hidden;
      transform: scale(0.98);
      transition: opacity var(--transition), transform var(--transition), visibility 0s linear 0.45s;
    }

    .screen.active {
      position: relative;
      inset: auto;
      opacity: 1;
      visibility: visible;
      transform: scale(1);
      transition: opacity var(--transition), transform var(--transition), visibility 0s linear 0s;
    }

    /* Ad screen */
    .ad-screen {
      background: linear-gradient(160deg, #075985 0%, #0c4a6e 50%, #082f49 100%);
      color: var(--white);
      text-align: center;
      gap: 1.5rem;
    }

    .ad-screen .ad-inner {
      max-width: 22rem;
      width: 100%;
    }

    .logo-mark {
      width: 4.5rem;
      height: 4.5rem;
      margin: 0 auto 1rem;
      background: linear-gradient(135deg, var(--white) 0%, var(--brand-soft) 100%);
      border-radius: 1rem;
      display: grid;
      place-items: center;
      font-weight: 700;
      font-size: 1.35rem;
      color: var(--brand-deep);
      box-shadow: var(--shadow);
    }

    .ad-title {
      font-size: clamp(1.35rem, 4vw, 1.65rem);
      font-weight: 700;
      line-height: 1.35;
      margin: 0 0 0.5rem;
    }

    .ad-sub {
      font-size: 0.95rem;
      opacity: 0.9;
      margin: 0;
    }

    .countdown-wrap {
      margin-top: 1.75rem;
      padding: 1rem 1.25rem;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: var(--radius);
      backdrop-filter: blur(8px);
    }

    .countdown-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      opacity: 0.85;
      margin: 0 0 0.35rem;
    }

    .countdown-value {
      font-size: clamp(2rem, 8vw, 2.75rem);
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      margin: 0;
    }

    .countdown-hint {
      font-size: 0.85rem;
      margin: 0.75rem 0 0;
      opacity: 0.88;
    }

    /* Card / form */
    .card {
      width: 100%;
      max-width: 26rem;
      background: var(--white);
      border-radius: calc(var(--radius) + 0.25rem);
      box-shadow: var(--shadow);
      padding: clamp(1.35rem, 4vw, 2rem);
    }

    .ssid-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--brand);
      background: var(--brand-soft);
      padding: 0.35rem 0.75rem;
      border-radius: 999px;
      margin-bottom: 1rem;
    }

    .ssid-badge svg {
      width: 0.9rem;
      height: 0.9rem;
      flex-shrink: 0;
    }

    .card h1 {
      font-size: clamp(1.25rem, 4vw, 1.5rem);
      margin: 0 0 0.35rem;
      color: var(--brand-deep);
    }

    .card .lead {
      margin: 0 0 1.25rem;
      font-size: 0.9rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.35rem;
    }

    .field {
      margin-bottom: 1rem;
    }

    input[type="text"],
    input[type="tel"] {
      width: 100%;
      padding: 0.75rem 0.9rem;
      font-size: 1rem;
      font-family: inherit;
      border: 1px solid #cbd5e1;
      border-radius: 0.65rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      outline: none;
      border-color: var(--brand-light);
      box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.25);
    }

    input.invalid {
      border-color: #dc2626;
    }

    .error-msg {
      font-size: 0.75rem;
      color: #dc2626;
      margin: 0.35rem 0 0;
      min-height: 1.1em;
    }

    .checkbox-row {
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      margin: 1rem 0 1.25rem;
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.45;
    }

    .checkbox-row input {
      margin-top: 0.2rem;
      width: 1.05rem;
      height: 1.05rem;
      accent-color: var(--brand);
      flex-shrink: 0;
    }

    .btn {
      width: 100%;
      padding: 0.9rem 1rem;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      color: var(--white);
      background: linear-gradient(135deg, var(--brand) 0%, var(--brand-deep) 100%);
      border: none;
      border-radius: 0.65rem;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 14px rgba(3, 105, 161, 0.4);
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(3, 105, 161, 0.45);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    /* Success */
    .success-screen .card {
      text-align: center;
    }

    .success-icon {
      width: 3.5rem;
      height: 3.5rem;
      margin: 0 auto 1rem;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: white;
      font-size: 1.75rem;
      font-weight: 700;
    }

    .success-text {
      font-size: 1.05rem;
      line-height: 1.55;
      color: var(--text);
      margin: 0 0 0.75rem;
    }

    .redirect-note {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="portal">
    <!-- Ad (10s) -->
    <section id="ad-screen" class="screen ad-screen active" aria-live="polite">
      <div class="ad-inner">
        <div class="logo-mark" aria-hidden="true">K</div>
        <h2 class="ad-title">Special Offer — Free WiFi</h2>
        <p class="ad-sub">ຍິນດີຕ້ອນຮັບສູ່ເຄືອຂ່າຍຂອງພວກເຮົາ</p>
        <div class="countdown-wrap">
          <p class="countdown-label">Connecting</p>
          <p id="countdown-display" class="countdown-value">10</p>
          <p id="countdown-line" class="countdown-hint">Connecting in 10…</p>
        </div>
      </div>
    </section>

    <!-- Form -->
    <section id="form-screen" class="screen" aria-hidden="true">
      <div class="card">
        <div class="ssid-badge" title="WiFi network">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M5 12.55a11 11 0 0 1 14.08 0" />
            <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
            <path d="M12 20h.01" />
          </svg>
          <span id="ssid-text">Kolaogroup-Guest</span>
        </div>
        <h1>ເຊື່ອມຕໍ່ WiFi</h1>
        <p class="lead">ກະລຸນາກອກຂໍ້ມູນເພື່ອເຂົ້າໃຊ້ອິນເຕີເນັດຟຣີ</p>
        <form id="wifi-form" novalidate>
          <div class="field">
            <label for="name">ຊື່ <span aria-hidden="true">*</span></label>
            <input type="text" id="name" name="name" autocomplete="name" required placeholder="ຊື່ຂອງທ່ານ" />
            <p class="error-msg" id="name-error" role="alert"></p>
          </div>
          <div class="field">
            <label for="phone">ເບີໂທ <span aria-hidden="true">*</span></label>
            <input type="tel" id="phone" name="phone" autocomplete="tel" required placeholder="020 1234 5678 ຫຼື +856 20…" inputmode="tel" />
            <p class="error-msg" id="phone-error" role="alert"></p>
          </div>
          <div class="checkbox-row">
            <input type="checkbox" id="terms" name="terms" />
            <label for="terms" style="margin: 0; font-weight: 400; cursor: pointer">ຂ້ອຍຍອມຮັບເງື່ອນໄຂ ແລະ ນະໂຍບາຍຄວາມເປັນສ່ວນຕົວ (ສະແດງຢ່າງຈຳລອງ)</label>
          </div>
          <p class="error-msg" id="terms-error" role="alert"></p>
          <button type="submit" class="btn" id="submit-btn">ເຊື່ອມຕໍ່</button>
        </form>
      </div>
    </section>

    <!-- Success -->
    <section id="success-screen" class="screen success-screen" aria-live="polite" aria-hidden="true">
      <div class="card">
        <div class="success-icon" aria-hidden="true">✓</div>
        <p class="success-text" id="success-message">
          ເຊື່ອມຕໍ່ສຳເລັດ! ກຳລັງພາທ່ານໄປຫາເວັບໄຊ…
        </p>
        <p class="redirect-note" id="redirect-countdown"></p>
      </div>
    </section>
  </div>

  <script>
    (function () {
      var AD_SECONDS = 10;
      var REDIRECT_URL = "https://kolaogroup.la";
      var REDIRECT_DELAY_MS = 3000;

      /** Edit SSID for your hotspot */
      var WIFI_SSID = "Kolaogroup-Guest";

      var adScreen = document.getElementById("ad-screen");
      var formScreen = document.getElementById("form-screen");
      var successScreen = document.getElementById("success-screen");
      var countdownDisplay = document.getElementById("countdown-display");
      var countdownLine = document.getElementById("countdown-line");
      var ssidText = document.getElementById("ssid-text");
      var form = document.getElementById("wifi-form");
      var nameInput = document.getElementById("name");
      var phoneInput = document.getElementById("phone");
      var termsInput = document.getElementById("terms");
      var nameError = document.getElementById("name-error");
      var phoneError = document.getElementById("phone-error");
      var termsError = document.getElementById("terms-error");
      var redirectNote = document.getElementById("redirect-countdown");
      var redirectTimerId = null;

      ssidText.textContent = WIFI_SSID;

      function showScreen(el) {
        [adScreen, formScreen, successScreen].forEach(function (s) {
          s.classList.remove("active");
          s.setAttribute("aria-hidden", "true");
        });
        el.classList.add("active");
        el.setAttribute("aria-hidden", "false");
      }

      /* Lao mobile: +856 / 856 / 0 + prefix (20,21,30,31,5x) + 6–8 subscriber digits */
      function normalizeLaoPhone(raw) {
        var d = String(raw).replace(/\D/g, "");
        if (d.length >= 10 && d.slice(0, 3) === "856") {
          d = d.slice(3);
        }
        if (d.length >= 9 && d[0] === "0") {
          d = d.slice(1);
        }
        return d;
      }

      function isValidLaoPhone(raw) {
        var d = normalizeLaoPhone(raw);
        if (d.length < 8 || d.length > 10) return false;
        return /^(20|21|30|31|5[0-9])\d{6,8}$/.test(d);
      }

      function runAdCountdown() {
        var n = AD_SECONDS;
        function tick() {
          countdownDisplay.textContent = String(n);
          countdownLine.textContent = "Connecting in " + n + "…";
          if (n <= 0) {
            showScreen(formScreen);
            nameInput.focus();
            return;
          }
          n -= 1;
          setTimeout(tick, 1000);
        }
        tick();
      }

      function clearFieldErrors() {
        nameError.textContent = "";
        phoneError.textContent = "";
        termsError.textContent = "";
        nameInput.classList.remove("invalid");
        phoneInput.classList.remove("invalid");
      }

      function validateForm() {
        clearFieldErrors();
        var ok = true;
        var name = nameInput.value.trim();
        if (!name) {
          nameError.textContent = "ກະລຸນາກອກຊື່";
          nameInput.classList.add("invalid");
          ok = false;
        }
        var phone = phoneInput.value.trim();
        if (!phone) {
          phoneError.textContent = "ກະລຸນາກອກເບີໂທ";
          phoneInput.classList.add("invalid");
          ok = false;
        } else if (!isValidLaoPhone(phone)) {
          phoneError.textContent =
            "ກະລຸນາໃສ່ເບີລາວທີ່ຖືກຕ້ອງ (ຕົວຢ່າງ: 020 12345678 ຫຼື +856 20 12345678)";
          phoneInput.classList.add("invalid");
          ok = false;
        }
        if (!termsInput.checked) {
          termsError.textContent = "ກະລຸນາກົດຍອມຮັບເງື່ອນໄຂ";
          ok = false;
        }
        return ok;
      }

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        if (!validateForm()) return;

        var payload = {
          name: nameInput.value.trim(),
          phone: phoneInput.value.trim(),
          ssid: WIFI_SSID,
          submittedAt: new Date().toISOString(),
        };

        try {
          var key = "wifiPortal_submissions";
          var prev = localStorage.getItem(key);
          var list = prev ? JSON.parse(prev) : [];
          if (!Array.isArray(list)) list = [];
          list.push(payload);
          localStorage.setItem(key, JSON.stringify(list));
        } catch (err) {
          console.warn("localStorage:", err);
        }
        console.log("[WiFi portal] submission:", payload);

        showScreen(successScreen);
        redirectNote.textContent = "";

        if (redirectTimerId) clearInterval(redirectTimerId);
        var secs = Math.ceil(REDIRECT_DELAY_MS / 1000);
        redirectNote.textContent = "ກຳລັງໄປຫາເວັບໄຊໃນ " + secs + " ວິນາທີ…";
        redirectTimerId = setInterval(function () {
          secs -= 1;
          if (secs > 0) {
            redirectNote.textContent = "ກຳລັງໄປຫາເວັບໄຊໃນ " + secs + " ວິນາທີ…";
          }
        }, 1000);

        setTimeout(function () {
          if (redirectTimerId) clearInterval(redirectTimerId);
          redirectTimerId = null;
          window.location.href = REDIRECT_URL;
        }, REDIRECT_DELAY_MS);
      });

      runAdCountdown();
    })();
  </script>
</body>
</html>
